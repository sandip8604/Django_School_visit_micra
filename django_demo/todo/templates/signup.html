<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="register-container">
    <div class="register-card">

        <div class="card-header">
            <h2 class="title">Create Account</h2>
            <p class="subtitle">Start managing your todos today</p>
        </div>

        <form id="signupForm" class="register-form">

            <div class="input-group">
                <label>Username</label>
                <div class="input-wrap">
                    <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <input type="text" name="username" placeholder="Choose a username" required>
                </div>
            </div>

            <!-- Password -->
            <div class="input-group">
                <label>Password</label>
                <div class="input-wrap">
                    <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                    <button type="button" class="toggle-pw" onclick="togglePassword(this)">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" class="register-btn">
                Create Account
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="5" y1="12" x2="19" y2="12" />
                    <polyline points="12 5 19 12 12 19" />
                </svg>
            </button>

        </form>

        <div class="divider"><span>or</span></div>

        <div class="login-link">
            Already have an account?
            <a href="/">Sign in</a>
        </div>

    </div>
</div>
</body>
</html>



<script>

    function togglePassword(btn) {
        const input = btn.closest(".input-wrap").querySelector("input")
        input.type = input.type === "password" ? "text" : "password"
    }

    document.getElementById("signupForm").addEventListener("submit", async function (e) {

        e.preventDefault()

      
        const username = this.username.value
        const password = this.password.value

        try {

            const response = await fetch("/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            })

            let data
            try { data = await response.json() } catch { data = {} }

            if (response.ok) {
                localStorage.setItem("access_token", data.access_token)
                localStorage.setItem("user_name", data.user.name)
                window.location.href = "/todo"
            } else {
                alert(data.error || "Signup failed")
            }

        } catch (err) {
            console.error(err)
            alert("Server error")
        }

    })

</script>


<style>
    .register-container {
        min-height: calc(100vh - 60px);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 2rem;
    }

    .register-card {
        width: 100%;
        max-width: 380px;
        background: white;
        padding: 2.5rem;
        border-radius: 18px;
        border: 1px solid #eee;
        box-shadow: 0 10px 40px rgba(0, 0, 0, .08);
    }

    .card-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .title {
        font-size: 1.6rem;
        font-weight: 800;
    }

    .subtitle {
        font-size: .9rem;
        color: #777;
    }

    .register-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .input-group label {
        font-size: .8rem;
        font-weight: 600;
        display: block;
        margin-bottom: .3rem;
    }

    .input-wrap {
        position: relative;
    }

    .input-icon {
        position: absolute;
        left: .8rem;
        top: 50%;
        transform: translateY(-50%);
        color: #888;
    }

    .input-wrap input {
        width: 100%;
        padding: .7rem .8rem .7rem 2.2rem;
        border: 1px solid #ddd;
        border-radius: 10px;
        font-size: .9rem;
    }

    .input-wrap input:focus {
        border-color: #4f6ef7;
        outline: none;
        box-shadow: 0 0 0 3px rgba(79, 110, 247, .15);
    }

    .toggle-pw {
        position: absolute;
        right: .6rem;
        top: 50%;
        transform: translateY(-50%);
        border: none;
        background: none;
        cursor: pointer;
    }

    .register-btn {
        margin-top: .6rem;
        padding: .75rem;
        background: #4f6ef7;
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: .4rem;
    }

    .register-btn:hover {
        background: #3556f2;
    }

    .divider {
        display: flex;
        align-items: center;
        gap: .5rem;
        margin: 1.2rem 0;
        font-size: .75rem;
        color: #999;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #eee;
    }

    .login-link {
        text-align: center;
        font-size: .85rem;
    }

    .login-link a {
        color: #4f6ef7;
        font-weight: 600;
        text-decoration: none;
    }
</style>
